<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-section input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-section button:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .todo-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-list::-webkit-scrollbar {
            width: 8px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f1f5;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-content {
            flex: 1;
        }

        .todo-text {
            font-size: 1em;
            color: #333;
            margin-bottom: 5px;
        }

        .todo-priority {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            margin-right: 8px;
        }

        .todo-priority.high {
            background: #ffebee;
            color: #c62828;
        }

        .todo-priority.medium {
            background: #fff3e0;
            color: #e65100;
        }

        .todo-priority.low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .todo-date {
            font-size: 0.8em;
            color: #999;
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .todo-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #667eea;
            color: white;
        }

        .edit-btn:hover {
            background: #5568d3;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
        }

        .delete-btn:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .empty-state-text {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .clear-completed-btn {
            background: #fff3e0;
            color: #e65100;
        }

        .clear-completed-btn:hover {
            background: #ffe0b2;
        }

        .clear-all-btn {
            background: #ffebee;
            color: #c62828;
        }

        .clear-all-btn:hover {
            background: #ffcdd2;
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .edit-modal.active {
            display: flex;
        }

        .edit-modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .edit-modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .save-btn {
            background: #667eea;
            color: white;
        }

        .save-btn:hover {
            background: #5568d3;
        }

        .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .cancel-btn:hover {
            background: #d0d0d0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                flex-direction: row;
            }

            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div style="margin-bottom:18px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <a href="index.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Home</a>
        <a href="progress-dashboard.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Dashboard</a>
        <a href="assignments.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Assignments</a>
        <a href="calendar.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Calendar</a>
        <a href="gpa-calculator.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">GPA</a>
        <a href="clinical-hours.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Clinical</a>
        <a href="nclex-quiz.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">NCLEX</a>
        <a href="study-schedule.html" style="padding:8px 12px; border-radius:8px; text-decoration:none; color:inherit; background: rgba(255,255,255,0.06);">Study</a>
    </div>
    <div class="container">
        <div class="header">
            <h1>✓ My To-Do List</h1>
            <p>Stay organized and track your tasks</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="remainingCount">0</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..."
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="addTodo()">Add</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterTodos('all')">All</button>
            <button class="filter-btn" onclick="filterTodos('active')">Active</button>
            <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <div class="empty-state-text">No tasks yet</div>
                <p>Add a new task to get started!</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="clear-completed-btn" onclick="clearCompleted()">Clear Completed</button>
            <button class="clear-all-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <h2>Edit Task</h2>
            <div class="form-group">
                <label for="editText">Task</label>
                <input type="text" id="editText" placeholder="Enter task description">
            </div>
            <div class="form-group">
                <label for="editPriority">Priority</label>
                <select id="editPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editDate">Due Date</label>
                <input type="date" id="editDate">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveEdit()">Save</button>
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Constants
        const TODO_STORAGE_KEY = 'todos';
        const FILTER_KEY = 'filter';

        // State
        let todos = [];
        let currentFilter = 'all';
        let editingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTodos();
            loadFilter();
            renderTodos();
        });

        // LocalStorage Functions
        function saveTodos() {
            localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
        }

        function loadTodos() {
            const stored = localStorage.getItem(TODO_STORAGE_KEY);
            todos = stored ? JSON.parse(stored) : [];
        }

        function saveFilter() {
            localStorage.setItem(FILTER_KEY, currentFilter);
        }

        function loadFilter() {
            currentFilter = localStorage.getItem(FILTER_KEY) || 'all';
        }

        // Todo Management
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false,
                priority: 'medium',
                date: new Date().toISOString().split('T')[0],
                createdAt: new Date().toISOString()
            };

            todos.push(todo);
            saveTodos();
            input.value = '';
            input.focus();
            renderTodos();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        function deleteTodo(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                renderTodos();
            }
        }

        function openEditModal(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            editingId = id;
            document.getElementById('editText').value = todo.text;
            document.getElementById('editPriority').value = todo.priority;
            document.getElementById('editDate').value = todo.date;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        function saveEdit() {
            if (!editingId) return;

            const todo = todos.find(t => t.id === editingId);
            if (!todo) return;

            const newText = document.getElementById('editText').value.trim();
            if (!newText) {
                alert('Task cannot be empty!');
                return;
            }

            todo.text = newText;
            todo.priority = document.getElementById('editPriority').value;
            todo.date = document.getElementById('editDate').value;

            saveTodos();
            closeEditModal();
            renderTodos();
        }

        function clearCompleted() {
            if (confirm('Clear all completed tasks?')) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
            }
        }

        function clearAll() {
            if (confirm('Clear ALL tasks? This cannot be undone!')) {
                todos = [];
                saveTodos();
                renderTodos();
            }
        }

        // Filter
        function filterTodos(filter) {
            currentFilter = filter;
            saveFilter();
            updateFilterButtons();
            renderTodos();
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[onclick="filterTodos('${currentFilter}')"]`).classList.add('active');
        }

        function getFilteredTodos() {
            switch (currentFilter) {
                case 'active':
                    return todos.filter(t => !t.completed);
                case 'completed':
                    return todos.filter(t => t.completed);
                default:
                    return todos;
            }
        }

        // Render
        function renderTodos() {
            const list = document.getElementById('todoList');
            const filtered = getFilteredTodos();

            // Update stats
            const completed = todos.filter(t => t.completed).length;
            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('remainingCount').textContent = todos.length - completed;

            // Render todos
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">No tasks here</div>
                        <p>${currentFilter === 'completed' ? 'Complete some tasks to see them here!' : 'Add a new task to get started!'}</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="todo-checkbox" 
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div>
                            <span class="todo-priority ${todo.priority}">${todo.priority.toUpperCase()}</span>
                            <span class="todo-date">${formatDate(todo.date)}</span>
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="edit-btn" onclick="openEditModal(${todo.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Utilities
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (date.toDateString() === today.toDateString()) {
                return 'Today';
            } else if (date.toDateString() === tomorrow.toDateString()) {
                return 'Tomorrow';
            } else {
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        // Close modal on outside click
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
