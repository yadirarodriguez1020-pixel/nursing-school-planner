<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Schedule - Nursing School Planner</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
        .nav a{padding:8px 12px;border-radius:8px;text-decoration:none;color:inherit;background:rgba(255,255,255,0.12)}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:20px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,0.18)}
        h1{font-size:2.2em;color:#333;margin-bottom:8px}
        p{color:#666;margin-bottom:24px}
        .grid{display:grid;grid-template-columns:1fr 360px;gap:20px}
        .card{background:#f8f9fa;border-radius:16px;padding:20px}
        .form-group{margin-bottom:16px}
        label{display:block;margin-bottom:8px;font-weight:700;color:#444}
        input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #dfe3eb;font-family:inherit}
        button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-weight:700;cursor:pointer}
        .schedule-table{width:100%;border-collapse:collapse;margin-top:20px}
        .schedule-table th,.schedule-table td{padding:12px;border-bottom:1px solid #e0e3ee;text-align:left}
        .schedule-table th{background:#e7ecf8;color:#333}
        .empty{padding:40px;text-align:center;color:#777}
        .small-btn{padding:10px;border:none;border-radius:10px;cursor:pointer;font-weight:700;color:white;background:#ff6b6b}
        @media(max-width:960px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="progress-dashboard.html">Dashboard</a>
        <a href="assignments.html">Assignments</a>
        <a href="calendar.html">Calendar</a>
        <a href="gpa-calculator.html">GPA</a>
        <a href="clinical-hours.html">Clinical</a>
        <a href="nclex-quiz.html">NCLEX</a>
        <a href="study-schedule.html">Study</a>
        <a href="skills-checklist.html">Skills</a>
        <a href="weekly-planner.html">Planner</a>
        <a href="exam-tracker.html">Exams</a>
        <a href="habit-tracker.html">Habits</a>
        <a href="self-care-log.html">Self-Care</a>
        <a href="class-schedule.html">Classes</a>
    </div>
    <div class="container">
        <h1>📚 Class Schedule</h1>
        <p>Keep your course schedule organized with times, locations, and instructors.</p>
        <div class="grid">
            <div class="card">
                <h2>Add Class</h2>
                <div class="form-group"><label for="className">Course Name</label><input id="className" placeholder="Nursing Fundamentals"/></div>
                <div class="form-group"><label for="classTime">Meeting Time</label><input id="classTime" placeholder="Mon/Wed 10:00 - 11:30 AM"/></div>
                <div class="form-group"><label for="classLocation">Location</label><input id="classLocation" placeholder="Room 204"/></div>
                <div class="form-group"><label for="classInstructor">Instructor</label><input id="classInstructor" placeholder="Dr. Smith"/></div>
                <div class="form-group"><label for="classNotes">Notes</label><input id="classNotes" placeholder="Office hours, syllabus notes..."/></div>
                <button onclick="saveClass()">Save Class</button>
            </div>
            <div class="card">
                <h2>Schedule Summary</h2>
                <div id="scheduleSummary" style="color:#555;line-height:1.75"></div>
            </div>
        </div>
        <div class="card" id="classesContainer"></div>
    </div>
    <script>
        const STORAGE_KEY='nsp_class_schedule'; let classes=[];
        document.addEventListener('DOMContentLoaded',()=>{ loadClasses(); renderClasses(); });
        function loadClasses(){ classes=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
        function saveClasses(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(classes)); }
        function saveClass(){ const name=document.getElementById('className').value.trim(); const time=document.getElementById('classTime').value.trim(); const location=document.getElementById('classLocation').value.trim(); const instructor=document.getElementById('classInstructor').value.trim(); const notes=document.getElementById('classNotes').value.trim(); if(!name||!time){ alert('Course name and time are required'); return; } classes.push({ id:Date.now(), name,time,location,instructor,notes }); saveClasses(); renderClasses(); resetForm(); }
        function resetForm(){ document.getElementById('className').value=''; document.getElementById('classTime').value=''; document.getElementById('classLocation').value=''; document.getElementById('classInstructor').value=''; document.getElementById('classNotes').value=''; }
        function renderClasses(){ const container=document.getElementById('classesContainer'); if(classes.length===0){ container.innerHTML='<div class="empty"><p>No classes added yet.</p></div>'; updateSummary(); return; } container.innerHTML=`<table class="schedule-table"><thead><tr><th>Course</th><th>Time</th><th>Location</th><th>Instructor</th><th>Actions</th></tr></thead><tbody>${classes.map(c=>`<tr><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.time)}</td><td>${escapeHtml(c.location||'-')}</td><td>${escapeHtml(c.instructor||'-')}</td><td><button class="small-btn" onclick="deleteClass(${c.id})">Delete</button></td></tr>`).join('')}</tbody></table>`; updateSummary(); }
        function deleteClass(id){ classes=classes.filter(c=>c.id!==id); saveClasses(); renderClasses(); }
        function updateSummary(){ const total=classes.length; document.getElementById('scheduleSummary').innerHTML=`<p>Total classes: <strong>${total}</strong></p>${classes.length?`<p>Latest added: <strong>${escapeHtml(classes[classes.length-1].name)}</strong></p>`:''}`; }
        function escapeHtml(text){ const div=document.createElement('div'); div.textContent=text; return div.innerHTML; }
    </script>
</body>
</html>
