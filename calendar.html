<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar - Nursing School Planner</title>
<style>
  :root{--accent:#667eea;--muted:#6b7280}
  body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:#f7f9fc;color:#111;margin:0;padding:24px}
  .container{max-width:980px;margin:0 auto}
  .header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  a.nav{color:var(--accent);text-decoration:none;font-weight:600}
  h1{margin:0;font-size:1.4rem}
  .controls{margin-left:auto;display:flex;gap:8px}
  .btn{background:white;border:1px solid #e6e9ee;padding:8px 12px;border-radius:8px;cursor:pointer}
  .calendar{background:white;border-radius:12px;padding:16px;box-shadow:0 8px 30px rgba(16,24,40,0.06)}
  .monthHead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;color:var(--muted);font-weight:700;font-size:0.9rem}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{min-height:90px;padding:8px;border-radius:8px;background:#fafbfd;border:1px solid #f0f2f6}
  .cell.other{opacity:0.45}
  .dateNum{font-weight:700;margin-bottom:6px}
  .event{display:block;background:linear-gradient(90deg,var(--accent),#764ba2);color:white;padding:4px 6px;border-radius:6px;font-size:0.8rem;margin-bottom:6px;cursor:pointer}
  .sidebar{margin-top:16px;display:flex;gap:12px}
  .sideCard{flex:1;background:#fff;border-radius:10px;padding:12px}
  .sideCard h3{margin:0 0 8px 0}
  .noEvents{color:var(--muted)}
  @media (max-width:720px){ .cell{min-height:70px} .header{flex-direction:column;align-items:flex-start} }
</style>
</head>
<body>
  <div style="margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <a class="nav" href="index.html">Home</a>
    <a class="nav" href="progress-dashboard.html">Dashboard</a>
    <a class="nav" href="assignments.html">Assignments</a>
    <a class="nav" href="calendar.html">Calendar</a>
    <a class="nav" href="gpa-calculator.html">GPA</a>
    <a class="nav" href="clinical-hours.html">Clinical</a>
    <a class="nav" href="nclex-quiz.html">NCLEX</a>
    <a class="nav" href="study-schedule.html">Study</a>
    <a class="nav" href="skills-checklist.html">Skills</a>
    <a class="nav" href="weekly-planner.html">Planner</a>
    <a class="nav" href="exam-tracker.html">Exams</a>
    <a class="nav" href="habit-tracker.html">Habits</a>
    <a class="nav" href="self-care-log.html">Self-Care</a>
    <a class="nav" href="class-schedule.html">Classes</a>
  </div>
  <div class="container">
    <div class="header">
      <div>
        <a class="nav" href="index.html">Home</a> • <a class="nav" href="assignments.html">Assignments</a>
      </div>
      <h1>📅 Calendar</h1>
      <div class="controls">
        <button class="btn" id="prevBtn">◀</button>
        <div style="min-width:180px;text-align:center"><strong id="monthLabel"></strong></div>
        <button class="btn" id="nextBtn">▶</button>
      </div>
    </div>

    <div class="calendar">
      <div class="weekdays" id="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="grid" id="calendarGrid"></div>

      <div class="sidebar">
        <div class="sideCard">
          <h3 id="selectedDateLabel">Selected Date</h3>
          <div id="eventsForDate">Click a date to show events.</div>
        </div>
        <div class="sideCard">
          <h3>All Events</h3>
          <div id="allEventsList">Loading events…</div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Reads events from localStorage key 'nsp_calendar_events'
  const CAL_KEY = 'nsp_calendar_events';
  let events = []; // {id,title,date,source,assignmentId}
  let viewDate = new Date();
  let selectedDateStr = null;

  function loadEvents(){
    try{ events = JSON.parse(localStorage.getItem(CAL_KEY)) || []; }
    catch(e){ events = []; }
  }

  function saveEvents(){ localStorage.setItem(CAL_KEY, JSON.stringify(events)); }

  function start(){
    loadEvents();
    renderAllEventsList();
    renderMonth(viewDate);
    document.getElementById('prevBtn').addEventListener('click', ()=>{ changeMonth(-1); });
    document.getElementById('nextBtn').addEventListener('click', ()=>{ changeMonth(1); });
  }

  function changeMonth(delta){ viewDate.setMonth(viewDate.getMonth()+delta); renderMonth(viewDate); }

  function renderAllEventsList(){
    const el = document.getElementById('allEventsList');
    if (!events.length){ el.innerHTML = '<div class="noEvents">No events available.</div>'; return; }
    const sorted = events.slice().sort((a,b)=> new Date(a.date) - new Date(b.date));
    el.innerHTML = sorted.map(e=>{
      const d = e.date ? new Date(e.date).toLocaleDateString() : 'No date';
      return `<div style="margin-bottom:8px"><strong>${d}</strong> — <span style="color:var(--muted)">${e.title}</span></div>`;
    }).join('');
  }

  function renderMonth(date){
    const year = date.getFullYear();
    const month = date.getMonth();
    const first = new Date(year, month, 1);
    const startDay = first.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();

    document.getElementById('monthLabel').textContent = first.toLocaleString(undefined,{month:'long',year:'numeric'});

    // determine previous month's tail
    const prevDays = startDay; // number of leading cells
    const totalCells = Math.ceil((prevDays + daysInMonth) / 7) * 7;
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    for (let i=0;i<totalCells;i++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      const dayIndex = i - prevDays + 1; // 1-based day of current month

      if (dayIndex < 1){ // previous month
        cell.classList.add('other');
        const prevDate = new Date(year, month, dayIndex);
        cell.innerHTML = `<div class="dateNum">${prevDate.getDate()}</div>`;
      } else if (dayIndex > daysInMonth){ // next month
        cell.classList.add('other');
        const nextDate = new Date(year, month, dayIndex);
        cell.innerHTML = `<div class="dateNum">${nextDate.getDate()}</div>`;
      } else {
        const thisDate = new Date(year, month, dayIndex);
        const iso = toISO(thisDate);
        const dateNum = thisDate.getDate();
        cell.innerHTML = `<div class="dateNum">${dateNum}</div>`;

        const todays = events.filter(ev => ev.date === iso);
        todays.slice(0,3).forEach(ev => {
          const btn = document.createElement('button');
          btn.className = 'event';
          btn.textContent = ev.title;
          btn.onclick = (e)=>{ e.stopPropagation(); showEventDetail(ev); };
          cell.appendChild(btn);
        });

        if (todays.length > 3){
          const more = document.createElement('div');
          more.className = 'muted';
          more.style.marginTop = '6px';
          more.textContent = `+${todays.length-3} more`;
          cell.appendChild(more);
        }

        cell.addEventListener('click', ()=>{ selectDate(iso); });

        if (iso === selectedDateStr) cell.style.outline = '2px solid rgba(102,126,234,0.3)';
      }

      grid.appendChild(cell);
    }

    // update side selected date
    if (!selectedDateStr){ // default to today if in this month
      const todayIso = toISO(new Date());
      if (new Date(todayIso).getMonth() === month) selectDate(todayIso);
    } else {
      // if selectedDate not in this month, clear selection
      const sel = selectedDateStr ? new Date(selectedDateStr) : null;
      if (sel && sel.getMonth() !== month) { selectedDateStr = null; document.getElementById('selectedDateLabel').textContent = 'Selected Date'; document.getElementById('eventsForDate').innerHTML = 'Click a date to show events.'; }
    }
  }

  function selectDate(iso){
    selectedDateStr = iso;
    const dt = new Date(iso);
    document.getElementById('selectedDateLabel').textContent = dt.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric',year:'numeric'});
    const todays = events.filter(ev=>ev.date===iso);
    const el = document.getElementById('eventsForDate');
    if (!todays.length){ el.innerHTML = '<div class="noEvents">No events for this date.</div>'; return; }
    el.innerHTML = todays.map(ev=>`<div style="margin-bottom:10px"><strong>${ev.title}</strong><div class="muted">Source: ${ev.source||'unknown'}${ev.assignmentId? ' — assignment':' '}</div></div>`).join('');
    // re-render month to highlight
    renderMonth(viewDate);
  }

  function showEventDetail(ev){
    alert(`${ev.title}\nDate: ${ev.date || 'n/a'}\nSource: ${ev.source || 'n/a'}`);
  }

  function toISO(d){ const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}` }

  // re-load when storage changes (e.g., assignments page updated)
  window.addEventListener('storage', (e)=>{ if (e.key===CAL_KEY) { loadEvents(); renderAllEventsList(); renderMonth(viewDate); } });

  document.addEventListener('DOMContentLoaded', start);
</script>
</body>
</html>
